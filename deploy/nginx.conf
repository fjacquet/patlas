# patlas static site. SPA fallback, long-cache for content-hashed assets,
# always-revalidate for the app shell + service worker. WebAssembly is served
# as application/wasm (needed by the PPTX resvg rasterizer) via the base image's
# mime.types (nginx >= 1.21 ships it).
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Defense-in-depth headers. The principal Content-Security-Policy ships as a
    # <meta> tag inside index.html (it travels with the static file); these
    # response headers complement it.
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "no-referrer" always;

    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json image/svg+xml application/wasm;

    # Content-hashed build assets are immutable — cache for a year. Using
    # `expires` (not add_header) keeps the inherited security headers above.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # The app shell and the service worker must always revalidate so a new
    # deploy is picked up promptly.
    location = /index.html { expires -1; }
    location = /sw.js      { expires -1; }

    # SPA fallback — patlas holds all state client-side and has no server
    # routes, so any unknown path resolves to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
